syntax ="proto3";
import "google/protobuf/wrappers.proto";
option java_package="LeoulGetnetMs.OrderService.ProtoGenerated.OrderInfo";
option java_multiple_files=true;
package order_info_service;



service orderInformation{
  rpc getOrderInformation(google.protobuf.Int64Value) returns (order);
  rpc changeOrderStatus(google.protobuf.Int64Value) returns (order);
}


message orderItems{
  int64 productId=1;
  int32 quantity=2;
}

message order{
  int64 orderId=1;
  repeated orderItems items=2;
}


